<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background: rounded square -->
  <rect width="32" height="32" rx="7" fill="#0f1623"/>

  <!-- Node A: top-left rounded rect -->
  <rect x="3" y="5" width="11" height="7" rx="2" fill="none" stroke="#4f8ef7" stroke-width="1.5"/>
  <!-- Node B: top-right rounded rect -->
  <rect x="18" y="5" width="11" height="7" rx="2" fill="none" stroke="#4f8ef7" stroke-width="1.5"/>
  <!-- Arrow A -> B -->
  <line x1="14" y1="8.5" x2="18" y2="8.5" stroke="#4f8ef7" stroke-width="1.5" stroke-linecap="round"/>
  <polyline points="16,6.5 18,8.5 16,10.5" fill="none" stroke="#4f8ef7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Diamond decision node -->
  <polygon points="16,15 21,20 16,25 11,20" fill="none" stroke="#7eb8f7" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Lines from diamond -->
  <line x1="11" y1="20" x2="5" y2="20" stroke="#7eb8f7" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="21" y1="20" x2="27" y2="20" stroke="#7eb8f7" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Node C: bottom-left circle -->
  <circle cx="5" cy="20" r="2.5" fill="#1a2540" stroke="#7eb8f7" stroke-width="1.4"/>
  <!-- Node D: bottom-right circle -->
  <circle cx="27" cy="20" r="2.5" fill="#1a2540" stroke="#7eb8f7" stroke-width="1.4"/>
</svg>
